apiVersion: v1
kind: Service
metadata:
  name: {{ include "fiware-pep-proxy.fullname" . }}
  labels:
    app: {{ include "fiware-pep-proxy.name" . }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.pepProxy.port }}
      protocol: TCP
      name: http
  selector:
    app: {{ include "fiware-pep-proxy.name" . }}